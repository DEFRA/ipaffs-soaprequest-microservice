service: soaprequest-service

container:
  replicas: 1

config:
  JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=75.0"

resources:
  requests:
    cpu: 250m
    memory: 700Mi
  limits:
    cpu: 2
    memory: 700Mi

database:
  enabled: true
  databaseNames: [ "soaprequest-microservice" ]
  migrations:
    enabled: true

externalSecret:
  enabled: true
  refreshInterval: 1h
  secrets:
    - secretKey: BASE_SERVICE_DB_PASSWORD
      remoteKey: legacyDatabasePassword1
    - secretKey: NEW_BASE_SERVICE_DB_PASSWORD
      remoteKey: legacyDatabasePassword2
