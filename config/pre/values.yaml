container:
  replicas: 3

config:
  SPRING_PROFILES_ACTIVE: "k8s"

azure:
  sqlServerHostname: preimpdbssqa001.database.windows.net

database:
  legacyBaseServiceDbUserAd: "SA-AZURE-IMP-SQL-SOAPR-PRE@Defra.onmicrosoft.com"
  legacyManagedIdentityUser: "pre-imp-soaprequest-sql"
  migrations:
    enabled: true

externalSecret:
  enabled: true
  refreshInterval: 1h
  secrets:
    - secretKey: BASE_SERVICE_DB_PASSWORD
      remoteKey: soapRequestDatabasePassword
    - secretKey: NEW_BASE_SERVICE_DB_PASSWORD
      remoteKey: soapRequestDatabasePasswordNew
